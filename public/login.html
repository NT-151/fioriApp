<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiori — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14;
      --bg-surface: #16161e;
      --bg-raised: #1e1e2a;
      --border: #2a2a3e;
      --text: #e4e4ed;
      --text-muted: #8888a4;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo span {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-title {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .form-group {
      position: relative;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 180ms ease;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
    }
    .toggle-pw:hover { color: var(--text); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease;
    }
    .login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      text-align: center;
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .lockout-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--danger);
      text-align: center;
      margin-bottom: 16px;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-logo">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="url(#g1)"/><path d="M9 18.5C9 16 11 14 14 14s5 2 5 4.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><circle cx="14" cy="10" r="3" stroke="#fff" stroke-width="1.8"/><defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs></svg>
        <span>Fiori DMs</span>
      </div>
      <div class="login-title">Enter your password to access the dashboard</div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" autofocus placeholder="Enter password" />
          <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Unlock Dashboard</button>
      </form>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      const pw = document.getElementById('password').value;

      if (!pw) { errEl.textContent = 'Please enter a password'; return; }

      btn.disabled = true;
      btn.textContent = 'Verifying…';
      errEl.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Incorrect password';
          document.getElementById('loginCard').classList.add('shake');
          setTimeout(() => document.getElementById('loginCard').classList.remove('shake'), 500);
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errEl.textContent = 'Connection failed. Try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Unlock Dashboard';
    }

    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
